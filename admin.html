<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理后台 - 捷牧教育官网建设项目</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-font-smoothing: antialiased; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      color: #0F172A; background: #F1F5F9; line-height: 1.6; min-height: 100vh;
    }
    :root {
      --primary: #20516F; --primary-light: #2a6a8f; --primary-bg: rgba(32,81,111,0.08);
      --accent: #B01616; --bg: #F8FAFC; --card: #FFFFFF; --border: #E2E8F0;
      --border-light: #F1F5F9; --ink: #0F172A; --ink-secondary: #475569; --muted: #94A3B8;
      --success: #16A34A; --success-bg: rgba(22,163,74,0.08);
      --info: #3B82F6; --info-bg: rgba(59,130,246,0.08);
      --warning: #F59E0B; --warning-bg: rgba(245,158,11,0.08);
      --radius: 12px; --radius-sm: 8px;
      --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.03);
      --shadow-hover: 0 4px 12px rgba(0,0,0,0.07);
      --max-width: 960px;
    }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 3px; }

    /* === Auth Overlay === */
    .auth-overlay {
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(15,23,42,0.6); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.4s ease, visibility 0.4s ease;
    }
    .auth-overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    .auth-overlay.hidden * { display: none; }
    .auth-card {
      background: var(--card); border-radius: 16px; padding: 40px;
      width: 420px; max-width: 90vw; text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15); animation: authIn 0.5s ease;
    }
    @keyframes authIn { from { opacity: 0; transform: translateY(20px) scale(0.96); } to { opacity: 1; transform: translateY(0) scale(1); } }
    .auth-icon { width: 56px; height: 56px; border-radius: 16px; background: var(--accent); display: inline-flex; align-items: center; justify-content: center; margin-bottom: 20px; }
    .auth-icon svg { width: 28px; height: 28px; color: #fff; }
    .auth-card h2 { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
    .auth-card p { font-size: 13px; color: var(--muted); margin-bottom: 24px; }
    .auth-input { width: 100%; padding: 12px 16px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 15px; outline: none; transition: border-color 0.2s; background: var(--bg); font-family: inherit; }
    .auth-input:focus { border-color: var(--primary); }
    .auth-input.error { border-color: var(--accent); animation: shake 0.4s ease; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-6px)} 40%,80%{transform:translateX(6px)} }
    .auth-error { color: var(--accent); font-size: 12px; margin-top: 8px; min-height: 18px; }
    .auth-btn { width: 100%; padding: 12px; background: var(--primary); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 12px; transition: background 0.2s, transform 0.1s; font-family: inherit; }
    .auth-btn:hover { background: var(--primary-light); }
    .auth-btn:active { transform: scale(0.98); }

    /* === Nav === */
    .nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(255,255,255,0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border); padding: 0 32px; height: 60px;
      display: flex; align-items: center;
    }
    .nav-inner { max-width: var(--max-width); width: 100%; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
    .nav-brand { display: flex; align-items: center; gap: 12px; }
    .nav-logo { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; background: var(--accent); }
    .nav-logo svg { width: 18px; height: 18px; color: #fff; }
    .nav-title { font-size: 15px; font-weight: 600; }
    .nav-subtitle { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .nav-actions { display: flex; align-items: center; gap: 10px; }
    .nav-link { font-size: 13px; color: var(--muted); text-decoration: none; transition: color 0.2s; }
    .nav-link:hover { color: var(--primary); }

    /* === Main === */
    .main { max-width: var(--max-width); margin: 0 auto; padding: 32px 32px 60px; }

    /* === Config Panel === */
    .config-panel {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 24px; margin-bottom: 24px; box-shadow: var(--shadow);
    }
    .config-panel h3 { font-size: 14px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .config-panel h3 svg { width: 16px; height: 16px; color: var(--muted); }
    .config-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
    .config-field label { display: block; font-size: 12px; font-weight: 500; color: var(--ink-secondary); margin-bottom: 4px; }
    .config-field input { width: 100%; padding: 8px 12px; border: 1.5px solid var(--border); border-radius: 6px; font-size: 13px; outline: none; font-family: 'SF Mono', 'Fira Code', monospace; background: var(--bg); transition: border-color 0.2s; }
    .config-field input:focus { border-color: var(--primary); }
    .config-actions { margin-top: 16px; display: flex; gap: 10px; align-items: center; }
    .config-status { font-size: 12px; color: var(--muted); }

    /* === Buttons === */
    .btn {
      display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px;
      border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit;
      transition: all 0.2s; background: var(--card); color: var(--ink);
    }
    .btn:hover { border-color: var(--primary); color: var(--primary); }
    .btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
    .btn-primary:hover { background: var(--primary-light); border-color: var(--primary-light); color: #fff; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-success { background: var(--success); color: #fff; border-color: var(--success); }
    .btn-success:hover { background: #15803d; border-color: #15803d; color: #fff; }
    .btn-danger { background: transparent; color: var(--accent); border-color: var(--accent); }
    .btn-danger:hover { background: var(--accent); color: #fff; }
    .btn svg { width: 14px; height: 14px; }

    /* === Section === */
    .section { margin-bottom: 28px; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .section-title { font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
    .section-title::before { content: ''; width: 3px; height: 16px; border-radius: 2px; background: var(--primary); }
    .section-badge { font-size: 11px; padding: 3px 10px; border-radius: 999px; font-weight: 500; }
    .section-badge.active { background: var(--primary-bg); color: var(--primary); }
    .section-badge.pending { background: var(--border-light); color: var(--muted); }

    /* === Phase Card === */
    .phase-card {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 20px; margin-bottom: 16px; box-shadow: var(--shadow);
      transition: box-shadow 0.25s;
    }
    .phase-card:hover { box-shadow: var(--shadow-hover); }
    .phase-card.active-phase { border-left: 3px solid var(--primary); }
    .phase-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
    .phase-name { font-size: 15px; font-weight: 600; }
    .phase-date { font-size: 12px; color: var(--muted); }
    .phase-desc { font-size: 13px; color: var(--ink-secondary); margin-bottom: 16px; }
    .phase-progress { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
    .progress-bar { flex: 1; height: 4px; background: var(--border-light); border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--primary); border-radius: 2px; transition: width 0.4s ease; }
    .progress-text { font-size: 12px; color: var(--muted); font-weight: 500; white-space: nowrap; }

    /* === Task List === */
    .task-list { list-style: none; }
    .task-item {
      display: flex; align-items: center; gap: 10px; padding: 8px 12px;
      border-radius: 6px; transition: background 0.15s; cursor: default;
    }
    .task-item:hover { background: var(--border-light); }
    .task-checkbox {
      width: 18px; height: 18px; border-radius: 5px; border: 2px solid var(--border);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; flex-shrink: 0; background: var(--card);
    }
    .task-checkbox:hover { border-color: var(--primary); }
    .task-checkbox.on { background: var(--success); border-color: var(--success); }
    .task-checkbox.on svg { display: block; }
    .task-checkbox svg { display: none; width: 12px; height: 12px; color: #fff; }
    .task-name { font-size: 13px; flex: 1; }
    .task-name.done { text-decoration: line-through; color: var(--muted); }
    .task-date { font-size: 11px; color: var(--muted); white-space: nowrap; }

    /* === Week Tabs === */
    .week-tabs { display: flex; gap: 4px; margin-bottom: 16px; background: var(--border-light); border-radius: var(--radius-sm); padding: 3px; }
    .week-tab {
      flex: 1; padding: 8px 12px; border: none; border-radius: 6px;
      font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit;
      background: transparent; color: var(--ink-secondary); transition: all 0.2s;
    }
    .week-tab.active { background: var(--card); color: var(--ink); box-shadow: var(--shadow); }
    .week-tab:hover:not(.active) { color: var(--ink); }
    .week-panel { display: none; }
    .week-panel.active { display: block; }
    .week-goal { font-size: 13px; color: var(--ink-secondary); margin-bottom: 12px; padding: 10px 14px; background: var(--border-light); border-radius: 6px; }
    .week-empty { text-align: center; padding: 32px; color: var(--muted); font-size: 13px; }

    /* === Deliverable Grid === */
    .deliverable-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .deliverable-card {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 16px; box-shadow: var(--shadow); transition: box-shadow 0.25s;
    }
    .deliverable-card:hover { box-shadow: var(--shadow-hover); }
    .deliverable-card.delivered { border-left: 3px solid var(--success); }
    .deliverable-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .deliverable-title { font-size: 14px; font-weight: 600; flex: 1; }
    .deliverable-desc { font-size: 12px; color: var(--ink-secondary); margin-bottom: 12px; }
    .deliverable-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .deliverable-status { font-size: 11px; padding: 3px 10px; border-radius: 999px; font-weight: 500; }
    .deliverable-status.on { background: var(--success-bg); color: var(--success); }
    .deliverable-status.off { background: var(--warning-bg); color: var(--warning); }
    .deliverable-date { font-size: 11px; color: var(--muted); }
    .deliverable-link-input {
      width: 100%; padding: 6px 10px; border: 1.5px solid var(--border); border-radius: 6px;
      font-size: 12px; outline: none; font-family: inherit; margin-top: 8px; background: var(--bg);
      transition: border-color 0.2s;
    }
    .deliverable-link-input:focus { border-color: var(--primary); }

    /* === Save Bar === */
    .save-bar {
      position: sticky; bottom: 0; z-index: 50;
      background: rgba(255,255,255,0.9); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid var(--border); padding: 12px 32px;
      display: flex; align-items: center; justify-content: space-between;
      transform: translateY(100%); transition: transform 0.3s ease;
    }
    .save-bar.visible { transform: translateY(0); }
    .save-bar-inner { max-width: var(--max-width); width: 100%; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
    .save-info { font-size: 13px; color: var(--ink-secondary); display: flex; align-items: center; gap: 6px; }
    .save-info svg { width: 14px; height: 14px; color: var(--warning); }
    .save-actions { display: flex; gap: 10px; }

    /* === Toast === */
    .toast {
      position: fixed; top: 20px; right: 20px; z-index: 10000;
      padding: 12px 20px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12); transform: translateX(120%);
      transition: transform 0.3s ease; display: flex; align-items: center; gap: 8px;
    }
    .toast.show { transform: translateX(0); }
    .toast.success { background: var(--success); color: #fff; }
    .toast.error { background: var(--accent); color: #fff; }
    .toast.info { background: var(--info); color: #fff; }

    /* === Loading === */
    .loading-overlay {
      position: fixed; inset: 0; z-index: 9998;
      background: rgba(248,250,252,0.8); backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; visibility: hidden; transition: all 0.3s;
    }
    .loading-overlay.show { opacity: 1; visibility: visible; }
    .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* === Responsive === */
    @media (max-width: 640px) {
      .config-grid { grid-template-columns: 1fr; }
      .deliverable-grid { grid-template-columns: 1fr; }
      .main { padding: 20px 16px 60px; }
      .nav { padding: 0 16px; }
    }
  </style>
</head>
<body>

<!-- Auth Overlay -->
<div class="auth-overlay" id="authOverlay">
  <div class="auth-card">
    <div class="auth-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>
    <h2>管理员验证</h2>
    <p>请输入管理密码以进入后台</p>
    <input type="password" class="auth-input" id="adminPwd" placeholder="管理密码" autocomplete="off">
    <div class="auth-error" id="authError"></div>
    <button class="auth-btn" onclick="handleAuth()">验证进入</button>
  </div>
</div>

<!-- Loading -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Nav -->
<nav class="nav" id="nav" style="display:none;">
  <div class="nav-inner">
    <div class="nav-brand">
      <div class="nav-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15V3m0 12l-4-4m4 4l4-4"/><path d="M2 17l.621 2.485A2 2 0 0 0 4.561 21h14.878a2 2 0 0 0 1.94-1.515L20 17"/></svg>
      </div>
      <div>
        <div class="nav-title">管理后台</div>
        <div class="nav-subtitle">捷牧教育官网建设项目</div>
      </div>
    </div>
    <div class="nav-actions">
      <a class="nav-link" href="index.html" target="_blank">查看前台</a>
    </div>
  </div>
</nav>

<!-- Main Content -->
<main class="main" id="mainContent" style="display:none;">

  <!-- GitHub Config -->
  <div class="config-panel">
    <h3>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      GitHub API 配置
    </h3>
    <div class="config-grid">
      <div class="config-field">
        <label>Token (Personal Access Token)</label>
        <input type="password" id="cfgToken" placeholder="ghp_xxxx...">
      </div>
      <div class="config-field">
        <label>仓库 Owner</label>
        <input type="text" id="cfgOwner" placeholder="your-username">
      </div>
      <div class="config-field">
        <label>仓库名称</label>
        <input type="text" id="cfgRepo" placeholder="repo-name">
      </div>
    </div>
    <div class="config-actions">
      <button class="btn btn-primary" onclick="connectGitHub()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg>
        连接并加载数据
      </button>
      <span class="config-status" id="configStatus">未连接</span>
    </div>
  </div>

  <!-- Phases Section -->
  <div class="section" id="phasesSection" style="display:none;">
    <div class="section-header">
      <div class="section-title">项目路线图 - 任务状态</div>
    </div>
    <div id="phasesContainer"></div>
  </div>

  <!-- Week Plans Section -->
  <div class="section" id="plansSection" style="display:none;">
    <div class="section-header">
      <div class="section-title">周计划 - 任务状态</div>
    </div>
    <div class="week-tabs" id="weekTabs"></div>
    <div id="weekPanels"></div>
  </div>

  <!-- Deliverables Section -->
  <div class="section" id="deliverablesSection" style="display:none;">
    <div class="section-header">
      <div class="section-title">交付物管理</div>
    </div>
    <div class="deliverable-grid" id="deliverablesGrid"></div>
  </div>

</main>

<!-- Save Bar -->
<div class="save-bar" id="saveBar">
  <div class="save-bar-inner">
    <div class="save-info">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="changeCount">0</span> 项变更未保存
    </div>
    <div class="save-actions">
      <button class="btn" onclick="discardChanges()">放弃变更</button>
      <button class="btn btn-success" onclick="saveToGitHub()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        保存到 GitHub
      </button>
    </div>
  </div>
</div>

<script>
// ============================================================
// Config
// ============================================================
const ADMIN_PASSWORD = "jiemu2026";
const CONFIG_KEY = "admin_github_config";

// ============================================================
// State
// ============================================================
var projectData = null;
var originalData = null; // deep copy for change detection
var githubConfig = { token: '', owner: '', repo: '', sha: '' };
var hasChanges = false;

// ============================================================
// Auth
// ============================================================
(function() {
  if (sessionStorage.getItem('admin_auth') === '1') {
    document.getElementById('authOverlay').classList.add('hidden');
    showApp();
  }
  document.getElementById('adminPwd').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') handleAuth();
  });
})();

function handleAuth() {
  var pwd = document.getElementById('adminPwd').value;
  if (pwd === ADMIN_PASSWORD) {
    sessionStorage.setItem('admin_auth', '1');
    document.getElementById('authOverlay').classList.add('hidden');
    showApp();
  } else {
    var input = document.getElementById('adminPwd');
    input.classList.add('error');
    document.getElementById('authError').textContent = '密码错误，请重试';
    setTimeout(function() { input.classList.remove('error'); }, 400);
  }
}

function showApp() {
  document.getElementById('nav').style.display = '';
  document.getElementById('mainContent').style.display = '';
  loadSavedConfig();
}

// ============================================================
// Config Persistence
// ============================================================
function loadSavedConfig() {
  try {
    var saved = JSON.parse(localStorage.getItem(CONFIG_KEY) || '{}');
    if (saved.token) document.getElementById('cfgToken').value = saved.token;
    if (saved.owner) document.getElementById('cfgOwner').value = saved.owner;
    if (saved.repo) document.getElementById('cfgRepo').value = saved.repo;
  } catch(e) {}
}

function saveConfig() {
  githubConfig.token = document.getElementById('cfgToken').value.trim();
  githubConfig.owner = document.getElementById('cfgOwner').value.trim();
  githubConfig.repo = document.getElementById('cfgRepo').value.trim();
  localStorage.setItem(CONFIG_KEY, JSON.stringify({
    token: githubConfig.token,
    owner: githubConfig.owner,
    repo: githubConfig.repo
  }));
}

// ============================================================
// GitHub API
// ============================================================
function githubApi(path, method, body) {
  var url = 'https://api.github.com/repos/' + githubConfig.owner + '/' + githubConfig.repo + path;
  var opts = {
    method: method,
    headers: {
      'Authorization': 'Bearer ' + githubConfig.token,
      'Accept': 'application/vnd.github.v3+json',
      'Content-Type': 'application/json'
    }
  };
  if (body) opts.body = JSON.stringify(body);
  return fetch(url, opts).then(function(r) {
    if (!r.ok) return r.json().then(function(e) { throw new Error(e.message || 'GitHub API Error: ' + r.status); });
    return r.json();
  });
}

async function connectGitHub() {
  saveConfig();
  if (!githubConfig.token || !githubConfig.owner || !githubConfig.repo) {
    showToast('请填写完整的 GitHub 配置信息', 'error');
    return;
  }
  showLoading(true);
  document.getElementById('configStatus').textContent = '连接中...';
  try {
    var res = await githubApi('/contents/data.json', 'GET');
    var content = atob(res.content);
    githubConfig.sha = res.sha;
    projectData = JSON.parse(content);
    originalData = JSON.parse(JSON.stringify(projectData));
    document.getElementById('configStatus').textContent = '已连接';
    document.getElementById('configStatus').style.color = 'var(--success)';
    renderAll();
    showToast('数据加载成功', 'success');
  } catch(e) {
    document.getElementById('configStatus').textContent = '连接失败';
    document.getElementById('configStatus').style.color = 'var(--accent)';
    showToast('连接失败: ' + e.message, 'error');
  }
  showLoading(false);
}

async function saveToGitHub() {
  if (!hasChanges) { showToast('没有需要保存的变更', 'info'); return; }
  saveConfig();
  showLoading(true);
  try {
    var content = btoa(unescape(encodeURIComponent(JSON.stringify(projectData, null, 2))));
    await githubApi('/contents/data.json', 'PUT', {
      message: 'update: 项目进度数据更新 (' + new Date().toLocaleString('zh-CN') + ')',
      content: content,
      sha: githubConfig.sha
    });
    githubConfig.sha = ''; // sha will change after update
    // Re-fetch to get new sha
    var res = await githubApi('/contents/data.json', 'GET');
    githubConfig.sha = res.sha;
    originalData = JSON.parse(JSON.stringify(projectData));
    hasChanges = false;
    updateSaveBar();
    renderAll();
    showToast('保存成功！前台页面将自动更新', 'success');
  } catch(e) {
    showToast('保存失败: ' + e.message, 'error');
  }
  showLoading(false);
}

function discardChanges() {
  if (!hasChanges) return;
  projectData = JSON.parse(JSON.stringify(originalData));
  hasChanges = false;
  updateSaveBar();
  renderAll();
  showToast('已放弃所有变更', 'info');
}

// ============================================================
// Change Tracking
// ============================================================
function markChanged() {
  hasChanges = JSON.stringify(projectData) !== JSON.stringify(originalData);
  updateSaveBar();
}

function updateSaveBar() {
  var bar = document.getElementById('saveBar');
  if (hasChanges) {
    bar.classList.add('visible');
    // Count changed items
    var count = 0;
    JSON.stringify(projectData).replace(/"on"/g, function() { count++; });
    var origCount = 0;
    JSON.stringify(originalData).replace(/"on"/g, function() { origCount++; });
    document.getElementById('changeCount').textContent = Math.abs(count - origCount);
  } else {
    bar.classList.remove('visible');
  }
}

// ============================================================
// Render Functions
// ============================================================
function renderAll() {
  renderPhases();
  renderWeekPlans();
  renderDeliverables();
  document.getElementById('phasesSection').style.display = '';
  document.getElementById('plansSection').style.display = '';
  document.getElementById('deliverablesSection').style.display = '';
}

function renderPhases() {
  var container = document.getElementById('phasesContainer');
  var html = '';
  projectData.phases.forEach(function(phase, pi) {
    var isActive = phase.status === 'active';
    var total = phase.tasks.length;
    var done = phase.tasks.filter(function(t) { return t.status === 'on'; }).length;
    var pct = total > 0 ? Math.round(done / total * 100) : 0;

    html += '<div class="phase-card' + (isActive ? ' active-phase' : '') + '">';
    html += '<div class="phase-header">';
    html += '<div class="phase-name">' + phase.name + '</div>';
    html += '<span class="section-badge ' + (isActive ? 'active' : 'pending') + '">' + (isActive ? '进行中' : phase.status === 'completed' ? '已完成' : '未开始') + '</span>';
    html += '</div>';
    html += '<div class="phase-date">' + phase.start + ' ~ ' + phase.end + '</div>';
    html += '<div class="phase-desc">' + phase.desc + '</div>';
    html += '<div class="phase-progress">';
    html += '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div></div>';
    html += '<div class="progress-text">' + done + '/' + total + ' (' + pct + '%)</div>';
    html += '</div>';
    html += '<ul class="task-list">';
    phase.tasks.forEach(function(task, ti) {
      var isOn = task.status === 'on';
      html += '<li class="task-item">';
      html += '<div class="task-checkbox' + (isOn ? ' on' : '') + '" data-phase="' + pi + '" data-task="' + ti + '" onclick="togglePhaseTask(' + pi + ',' + ti + ')">';
      html += '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>';
      html += '</div>';
      html += '<span class="task-name' + (isOn ? ' done' : '') + '">' + task.name + '</span>';
      html += '<span class="task-date">' + task.date + '</span>';
      html += '</li>';
    });
    html += '</ul></div>';
  });
  container.innerHTML = html;
}

function renderWeekPlans() {
  var tabsEl = document.getElementById('weekTabs');
  var panelsEl = document.getElementById('weekPanels');
  var tabsHtml = '';
  var panelsHtml = '';

  projectData.plans.forEach(function(plan, wi) {
    var activeClass = wi === 0 ? ' active' : '';
    tabsHtml += '<button class="week-tab' + activeClass + '" onclick="switchWeek(' + wi + ')">' + plan.label + '</button>';

    panelsHtml += '<div class="week-panel' + activeClass + '" id="weekPanel-' + wi + '">';
    if (plan.goal) {
      panelsHtml += '<div class="week-goal">' + plan.goal + '</div>';
    }
    if (plan.tasks.length === 0) {
      panelsHtml += '<div class="week-empty">暂无任务安排</div>';
    } else {
      panelsHtml += '<ul class="task-list">';
      plan.tasks.forEach(function(task, ti) {
        var isOn = task.status === 'on';
        panelsHtml += '<li class="task-item">';
        panelsHtml += '<div class="task-checkbox' + (isOn ? ' on' : '') + '" data-week="' + wi + '" data-task="' + ti + '" onclick="toggleWeekTask(' + wi + ',' + ti + ')">';
        panelsHtml += '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>';
        panelsHtml += '</div>';
        panelsHtml += '<span class="task-name' + (isOn ? ' done' : '') + '">' + task.name + '</span>';
        panelsHtml += '</li>';
      });
      panelsHtml += '</ul>';
    }
    panelsHtml += '</div>';
  });

  tabsEl.innerHTML = tabsHtml;
  panelsEl.innerHTML = panelsHtml;
}

function renderDeliverables() {
  var grid = document.getElementById('deliverablesGrid');
  var html = '';

  projectData.deliverables.forEach(function(item, di) {
    var isOn = item.delivered === 'on';
    html += '<div class="deliverable-card' + (isOn ? ' delivered' : '') + '">';
    html += '<div class="deliverable-header">';
    html += '<div class="deliverable-title">' + item.title + '</div>';
    html += '<span class="deliverable-status ' + (isOn ? 'on' : 'off') + '">' + (isOn ? '已交付' : '待交付') + '</span>';
    html += '</div>';
    html += '<div class="deliverable-desc">' + item.desc + '</div>';
    html += '<div class="deliverable-meta">';
    html += '<div class="task-checkbox' + (isOn ? ' on' : '') + '" style="width:16px;height:16px;border-radius:4px;" onclick="toggleDeliverable(' + di + ')">';
    html += '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>';
    html += '</div>';
    if (!isOn && item.expectedDate) {
      html += '<span class="deliverable-date">预计 ' + item.expectedDate + '</span>';
    }
    html += '</div>';
    html += '<input class="deliverable-link-input" type="text" placeholder="交付物链接（可选）" value="' + (item.link || '') + '" onchange="updateDeliverableLink(' + di + ', this.value)">';
    html += '</div>';
  });

  grid.innerHTML = html;
}

// ============================================================
// Toggle Functions
// ============================================================
function togglePhaseTask(pi, ti) {
  projectData.phases[pi].tasks[ti].status = projectData.phases[pi].tasks[ti].status === 'on' ? 'off' : 'on';
  markChanged();
  renderPhases();
}

function toggleWeekTask(wi, ti) {
  projectData.plans[wi].tasks[ti].status = projectData.plans[wi].tasks[ti].status === 'on' ? 'off' : 'on';
  markChanged();
  renderWeekPlans();
}

function toggleDeliverable(di) {
  projectData.deliverables[di].delivered = projectData.deliverables[di].delivered === 'on' ? 'off' : 'on';
  markChanged();
  renderDeliverables();
}

function updateDeliverableLink(di, value) {
  projectData.deliverables[di].link = value;
  markChanged();
}

function switchWeek(wi) {
  document.querySelectorAll('.week-tab').forEach(function(t, i) {
    t.classList.toggle('active', i === wi);
  });
  document.querySelectorAll('.week-panel').forEach(function(p, i) {
    p.classList.toggle('active', i === wi);
  });
}

// ============================================================
// UI Helpers
// ============================================================
function showToast(msg, type) {
  var toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast ' + (type || 'info');
  setTimeout(function() { toast.classList.add('show'); }, 10);
  setTimeout(function() { toast.classList.remove('show'); }, 3000);
}

function showLoading(show) {
  document.getElementById('loadingOverlay').classList.toggle('show', show);
}
</script>
